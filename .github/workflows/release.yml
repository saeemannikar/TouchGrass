name: Build and Release TouchGrass

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-20.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm install

      - name: Generate all icons from source PNG
        run: npx @tauri-apps/cli icon src-tauri/icons/128x128.png

      - name: Create lib.rs if missing
        run: |
          mkdir -p src-tauri/src
          if [ ! -f src-tauri/src/lib.rs ]; then
            echo "pub mod voxel;" > src-tauri/src/lib.rs
          fi
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TouchGrass ${{ github.ref_name }}
          releaseBody: |
            ## TouchGrass ${{ github.ref_name }}

            Free 3D clay sculpting with live hand tracking.

            ### Download the right file for your OS
            - **Windows** → `.msi`
            - **macOS** → `.dmg`
            - **Linux** → `.AppImage`

            No account required. Apache 2.0 open source.
            Made by Saee Mannikar
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
